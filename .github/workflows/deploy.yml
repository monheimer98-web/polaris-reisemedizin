name: Deploy to GitHub Pages

# Statisches Deployment der Meridian-Website auf GitHub Pages.
# Die offizielle withastro/action übernimmt Install + `astro build` und lädt
# das Pages-Artefakt hoch; actions/deploy-pages veröffentlicht es.
#
# Hinweis (laut Projektentscheidung): zunächst GitHub Pages, später Migration
# auf einen EU-/DE-Hoster (DSGVO/AVV, eigene Security-Header).
#
# Diese Vorschau läuft unter dem Projekt-Unterpfad
# „<user>.github.io/polaris-reisemedizin/". Damit Links, Assets, Canonical,
# Sitemap und hreflang stimmen, setzt der Build-Job unten die drei
# PUBLIC_*-Variablen (astro.config.mjs liest sie aus). Bei späterem Wechsel
# auf eine Custom-Domain einfach diese drei `env`-Zeilen entfernen (Defaults =
# Root-Pfad „/" + echte Domain, indexierbar) und eine CNAME-Datei ergänzen.

on:
  # Bei jedem Push auf main automatisch deployen …
  push:
    branches: [main]
  # … und manuell auslösbar.
  workflow_dispatch:

# Vom GitHub-Pages-Deployment benötigte Rechte (OIDC).
permissions:
  contents: read
  pages: write
  id-token: write

# Gleichzeitige Deployments vermeiden; laufendes nicht abbrechen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Unterpfad-/Vorschau-Konfiguration: astro.config.mjs liest diese Variablen
    # und richtet base, site (für Canonical/OG/hreflang/Sitemap) sowie das
    # noindex-Flag (SEO.astro) entsprechend aus. Für eine Custom-Domain einfach
    # entfernen (Defaults greifen).
    env:
      PUBLIC_BASE_PATH: /polaris-reisemedizin/
      PUBLIC_SITE_URL: https://monheimer98-web.github.io
      PUBLIC_NOINDEX: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build mit Astro
        uses: withastro/action@v6
        with:
          # Node-Version an den gepinnten Stack angleichen.
          node-version: 24
          # path: .                # Projekt-Root (Default)
          # package-manager: npm   # wird automatisch erkannt

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy auf GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
