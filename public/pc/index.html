<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Polaris Praxis</title>
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Polaris">
<meta name="theme-color" content="#0E3B43">
<style>
  html,body{margin:0;height:100%}
  body{background:#0E3B43;color:#F7F5F0;font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
       padding:env(safe-area-inset-top) 24px env(safe-area-inset-bottom);text-align:center}
  img{width:88px;height:88px;border-radius:22px;box-shadow:0 8px 30px rgba(0,0,0,.35)}
  .name{font-size:22px;font-weight:600;letter-spacing:.3px}
  .sub{font-size:14px;color:#bfd0ce}
  .spin{width:26px;height:26px;border:3px solid rgba(255,255,255,.25);border-top-color:#C9A24B;border-radius:50%;animation:s .8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  a{color:#C9A24B}
  #fehler{display:none;font-size:14px;color:#f0c0c0;max-width:300px}
</style>
</head>
<body>
  <img src="icon.png" alt="">
  <div class="name">Polaris · Praxis</div>
  <div class="spin" id="spin"></div>
  <div class="sub" id="status">wird geöffnet …</div>
  <div id="fehler">Das Backoffice ist nur im Praxisnetz erreichbar. Bitte mit dem Praxis-WLAN verbinden und prüfen, ob der Praxis-Mac läuft. <br><br><a href="#" onclick="location.reload();return false">Nochmal versuchen</a></div>
<script>
  // Das vollständige Backoffice (Patientenakten, Rechnungen, Admin) ist aus
  // Datenschutzgründen NUR im lokalen Praxisnetz (LAN) erreichbar – NICHT über
  // den öffentlichen Tunnel. Diese Verknüpfung führt daher fest auf die
  // LAN-Adresse (Caddy Port 8443, Bonjour-Name des Praxis-Macs). Außerhalb des
  // Praxisnetzes löst der Name nicht auf und die Fehlermeldung erscheint.
  (function () {
    var LAN_BACKOFFICE = "https://macbook-air-von-nicole.local:8443/";
    // Kurz prüfen, ob der LAN-Server erreichbar ist; sonst Hinweis zeigen.
    var img = new Image();
    var erledigt = false;
    var timer = setTimeout(zeigeFehler, 4000);
    function weiter() {
      if (erledigt) return; erledigt = true; clearTimeout(timer);
      location.replace(LAN_BACKOFFICE);
    }
    function zeigeFehler() {
      if (erledigt) return; erledigt = true; clearTimeout(timer);
      document.getElementById("spin").style.display = "none";
      document.getElementById("status").style.display = "none";
      document.getElementById("fehler").style.display = "block";
    }
    // Ein erreichbarer Server beantwortet die Favicon-Anfrage (load ODER error
    // wegen Zertifikat/Content) – beides heißt „Host da"; nur ein Timeout heißt
    // „nicht im Praxisnetz".
    img.onload = weiter;
    img.onerror = weiter;
    img.src = LAN_BACKOFFICE + "static/styles.css?_=" + Date.now();
  })();
</script>
</body>
</html>
